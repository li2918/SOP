name: Deploy VitePress site to GitHub Pages

on:
  # 每次 push 到 main 分支自动部署
  push:
    branches: [main]

  # 支持在 Actions 页面手动触发
  workflow_dispatch:

# 部署到 GitHub Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只允许一个部署进行，新 push 会取消排队中的旧任务
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整 git 历史，用于 lastUpdated 时间戳

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Verify STATICRYPT_PASSWORD secret is set
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::error::未设置 STATICRYPT_PASSWORD secret。请在 Settings → Secrets and variables → Actions → New repository secret 中添加，名称为 STATICRYPT_PASSWORD。"
            exit 1
          fi
          if [ ${#STATICRYPT_PASSWORD} -lt 10 ]; then
            echo "::warning::STATICRYPT_PASSWORD 长度不足 10 位，建议至少 14 位混合字符。"
          fi

      - name: Build with VitePress
        run: npm run build

      - name: Encrypt HTML with StatiCrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: npm run encrypt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
